services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://repomind:repomind@postgres:5432/repomind
      SECRET_KEY: change-me-before-production
      VECTOR_STORE_DIR: /app/data/vector_indexes
      UPLOAD_DIR: /app/data/uploads
      REDIS_URL: redis://redis:6379/0
    volumes:
      - repomind-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: celery -A app.tasks.indexing_tasks worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg://repomind:repomind@postgres:5432/repomind
      SECRET_KEY: change-me-before-production
      VECTOR_STORE_DIR: /app/data/vector_indexes
      UPLOAD_DIR: /app/data/uploads
      REDIS_URL: redis://redis:6379/0
    volumes:
      - repomind-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: repomind
      POSTGRES_USER: repomind
      POSTGRES_PASSWORD: repomind
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repomind -d repomind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  repomind-data:
  postgres-data:
